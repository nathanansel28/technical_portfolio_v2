<svg viewBox="0 0 920 470" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <!-- Card background so the diagram reads cleanly on light and dark themes -->
  <rect x="1" y="1" width="918" height="468" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>

  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrowAccent2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="36" y="44" font-size="17" font-weight="700" fill="#0f172a">Paired design with Common Random Numbers</text>
  <text x="36" y="64" font-size="12.5" fill="#64748b">The same seed drives both scenarios, so each A-vs-B pair faces the identical shift</text>

  <!-- ===== Seed box ===== -->
  <rect x="36" y="185" width="172" height="104" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="122" y="215" font-size="13.5" font-weight="700" fill="#0f172a" text-anchor="middle">Seed k, k = 1 &#8230; 30</text>
  <text x="122" y="235" font-size="11.5" fill="#475569" text-anchor="middle">Linear congruential PRNG</text>
  <text x="122" y="251" font-size="11.5" fill="#475569" text-anchor="middle">drives every stochastic draw</text>
  <text x="122" y="273" font-size="10.5" font-weight="600" fill="#0f766e" text-anchor="middle">identical patient arrivals</text>

  <!-- Arrows from seed to both scenarios -->
  <path d="M 208 215 C 248 215, 252 150, 288 150" fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow2)"/>
  <path d="M 208 260 C 248 260, 252 324, 288 324" fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow2)"/>
  <text x="236" y="176" font-size="10.5" fill="#64748b">same shift</text>
  <text x="236" y="310" font-size="10.5" fill="#64748b">same shift</text>

  <!-- ===== Scenario A ===== -->
  <rect x="292" y="106" width="234" height="88" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="308" y="133" font-size="13.5" font-weight="700" fill="#0f172a">Scenario A</text>
  <text x="308" y="152" font-size="11.5" fill="#475569">Nurses only</text>
  <text x="308" y="168" font-size="11.5" fill="#475569">One 8-hour shift, 960 ticks</text>
  <text x="308" y="184" font-size="11" fill="#64748b">&#8594; KPI&#8202;A(k)</text>

  <!-- ===== Scenario B ===== -->
  <rect x="292" y="280" width="234" height="88" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="308" y="307" font-size="13.5" font-weight="700" fill="#0f172a">Scenario B</text>
  <text x="308" y="326" font-size="11.5" fill="#475569">Same nurses + MEDi, BLANKi, EDi</text>
  <text x="308" y="342" font-size="11.5" fill="#475569">Same shift, same arrivals</text>
  <text x="308" y="358" font-size="11" fill="#64748b">&#8594; KPI&#8202;B(k)</text>

  <!-- Arrows into difference box -->
  <path d="M 526 150 C 572 150, 578 210, 618 222" fill="none" stroke="#0f766e" stroke-width="1.8" marker-end="url(#arrowAccent2)"/>
  <path d="M 526 324 C 572 324, 578 264, 618 252" fill="none" stroke="#0f766e" stroke-width="1.8" marker-end="url(#arrowAccent2)"/>

  <!-- ===== Paired difference ===== -->
  <rect x="622" y="192" width="172" height="90" rx="10" fill="#f0fdfa" stroke="#0f766e" stroke-width="2"/>
  <text x="708" y="222" font-size="13.5" font-weight="700" fill="#0f172a" text-anchor="middle">d(k) = A(k) &#8722; B(k)</text>
  <text x="708" y="243" font-size="11" fill="#475569" text-anchor="middle">30 paired differences;</text>
  <text x="708" y="258" font-size="11" fill="#475569" text-anchor="middle">between-seed variance</text>
  <text x="708" y="272" font-size="11" fill="#475569" text-anchor="middle">differences out</text>

  <!-- Output arrow down -->
  <path d="M 708 282 L 708 328" fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow2)"/>

  <!-- ===== Inference ===== -->
  <rect x="572" y="332" width="272" height="82" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="708" y="357" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">Paired inference</text>
  <text x="708" y="376" font-size="11" fill="#475569" text-anchor="middle">Paired t-test &#183; Cohen&#8217;s d&#8202;z &#183; 10,000-resample bootstrap</text>
  <text x="708" y="392" font-size="11" fill="#475569" text-anchor="middle">Holm&#8211;Bonferroni across 5 KPIs</text>

  <!-- Footer: sweep scale -->
  <rect x="36" y="418" width="380" height="30" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="50" y="437" font-size="11" fill="#475569">Same seeds reused across all <tspan font-weight="600" fill="#0f172a">118 design cells &#215; 30 reps = 3,540 runs</tspan></text>
</svg>
